<!DOCTYPE html>
<html>
<head>
    <title>I Love U Keyla ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        canvas { position: absolute; }
        .bottom {
            position: absolute;
            bottom: 55px;
            color: white;
            font-size: 38px;
            font-weight: bold;
            text-shadow: 0 0 20px red, 0 0 40px red;
            z-index: 10;
        }
    </style>
</head>
<body>

    <canvas id="c"></canvas>
    <div class="bottom">I ❤️ U Keyla</div>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        canvas.width = innerWidth;
        canvas.height = innerHeight;

        let W = canvas.width;
        let H = canvas.height;
        let texts = [];

        function heart(x, y) {
            let a = x * x + y * y - 1;
            return (a * a * a - x * x * y * y * y < 0);
        }

        // Generate titik-titik untuk membentuk hati
        for (let y = -1.3; y <= 1.3; y += 0.075) {
            for (let x = -1.5; x <= 1.5; x += 0.075) {
                if (heart(x, y)) {
                    texts.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        tx: W / 2 + x * 190,
                        ty: H / 2 - y * 190 - 15,
                        speed: 0.012 + Math.random() * 0.012
                    });
                }
            }
        }

        let done = false;
        setTimeout(() => { done = true; }, 6000);

        function animate() {
            ctx.clearRect(0, 0, W, H);

            let scale = 1;
            if (done) {
                // Efek detak jantung: Ritme lub-dub
                let time = Date.now() / 150;
                let beat = Math.sin(time) * 0.035;
                let pause = Math.sin(time / 2) * 0.015;
                scale = 1 + Math.max(0, beat + pause);
            }

            ctx.save();
            ctx.translate(W / 2, H / 2);
            ctx.scale(scale, scale);
            ctx.translate(-W / 2, -H / 2);

            ctx.font = "9px Arial";
            ctx.fillStyle = "#ff2b55";
            ctx.shadowBlur = 12;
            ctx.shadowColor = "red";

            texts.forEach(t => {
                t.x += (t.tx - t.x) * t.speed;
                t.y += (t.ty - t.y) * t.speed;
                ctx.fillText("i love you", t.x, t.y);
            });

            ctx.restore();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
